<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GWENKING ✂</title>

<style>
/* ═══════════════════════
   GWENKING LIVE 2026
   Design clean dark premium
   ═══════════════════════ */

body{
  margin:0;
  font-family: Arial, sans-serif;
  background:#0e0e14;
  color:white;
  text-align:center;
}

header{
  padding:40px 20px;
  background:#141422;
  border-bottom:1px solid #222;
}

h1{
  margin:0;
  font-size:42px;
  letter-spacing:2px;
}

.patch{
  margin-top:10px;
  color:#9b7bff;
  font-weight:bold;
}

section{
  padding:50px 20px;
}

.stats-container{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:20px;
}

.card{
  background:#1c1c2b;
  padding:25px;
  width:220px;
  border-radius:14px;
  transition:0.3s ease;
  box-shadow:0 0 0 rgba(0,0,0,0);
}

.card:hover{
  transform:translateY(-5px);
  box-shadow:0 8px 30px rgba(155,123,255,0.15);
}

.card h3{
  margin:0 0 15px;
  font-size:16px;
  color:#aaa;
}

.value{
  font-size:28px;
  font-weight:bold;
  color:#a78bfa;
}

.pro{
  background:#141422;
  border-top:1px solid #222;
}

#live-pro-count{
  font-size:18px;
  margin-top:20px;
  color:#9b7bff;
}

footer{
  padding:20px;
  font-size:12px;
  color:#666;
}
</style>
</head>

<body>

<header>
  <h1>GWENKING ✂</h1>
  <div class="patch">
    <span class="live-patch">Chargement patch...</span>
  </div>
</header>

<section>
  <h2>Statistiques Live</h2>

  <div class="stats-container">
    <div class="card">
      <h3>Winrate</h3>
      <div class="value live-wr">--%</div>
    </div>

    <div class="card">
      <h3>Pickrate</h3>
      <div class="value live-pr">--%</div>
    </div>

    <div class="card">
      <h3>Banrate</h3>
      <div class="value live-br">--%</div>
    </div>
  </div>
</section>

<section class="pro">
  <h2>Présence Compétitive 2026</h2>
  <div id="live-pro-count">Chargement...</div>
</section>

<footer>
  Données mises à jour automatiquement · Mars 2026
</footer>

<script>
/* ════════════════════════════════
   GWENKING LIVE ENGINE
   Compatible GitHub Pages
   ════════════════════════════════ */

(async function(){

const CACHE_TTL = 60 * 60 * 1000; // 1h

function setCache(key,data){
  localStorage.setItem(key, JSON.stringify({
    t: Date.now(),
    v: data
  }));
}

function getCache(key){
  const raw = localStorage.getItem(key);
  if(!raw) return null;
  const parsed = JSON.parse(raw);
  if(Date.now() - parsed.t > CACHE_TTL) return null;
  return parsed.v;
}

/* ───────── PATCH RIOT OFFICIEL ───────── */

async function updatePatch(){
  try{
    let versions = getCache("riot_versions");

    if(!versions){
      const res = await fetch("https://ddragon.leagueoflegends.com/api/versions.json");
      versions = await res.json();
      setCache("riot_versions",versions);
    }

    document.querySelectorAll(".live-patch")
      .forEach(e => e.textContent = "Patch " + versions[0]);

  }catch(e){
    console.log("Patch error",e);
  }
}

/* ───────── STATS GWEN (DPM API) ───────── */

async function updateStats(){
  try{
    let data = getCache("gwen_stats");

    if(!data){
      const res = await fetch("https://dpm.lol/api/champion/Gwen");
      data = await res.json();
      setCache("gwen_stats",data);
    }

    document.querySelectorAll(".live-wr")
      .forEach(e => e.textContent = (data.winRate * 100).toFixed(1) + "%");

    document.querySelectorAll(".live-pr")
      .forEach(e => e.textContent = (data.pickRate * 100).toFixed(1) + "%");

    document.querySelectorAll(".live-br")
      .forEach(e => e.textContent = (data.banRate * 100).toFixed(1) + "%");

  }catch(e){
    console.log("Stats error",e);
  }
}

/* ───────── PRO DATA (Oracle CSV via proxy) ───────── */

async function updatePro(){
  try{
    const res = await fetch(
      "https://api.allorigins.win/raw?url=" +
      encodeURIComponent(
        "https://oracleselixir-downloadable-match-data.s3.us-west-2.amazonaws.com/2025_LoL_esports_match_data_from_OraclesElixir.csv"
      )
    );

    const text = await res.text();
    const games = text.split("\n").filter(l => l.includes(",Gwen,")).length;

    const el = document.getElementById("live-pro-count");
    if(el) el.textContent = games + " games compétitifs cette saison";

  }catch(e){
    console.log("Pro error",e);
  }
}

/* ───────── INIT ───────── */

updatePatch();
updateStats();
updatePro();

})();
</script>

</body>
</html>
